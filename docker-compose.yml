services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: aquaguard
      POSTGRES_PASSWORD: aquaguard
      POSTGRES_DB: aquaguard
    ports:
      - "5439:5432"
    volumes:
      - aquaguard_pgdata:/var/lib/postgresql/data

volumes:
  aquaguard_pgdata:
